<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Instant browser redirect -->
    <meta http-equiv="refresh" content="0; url=https://ophel.app" />

    <!-- Canonical: tell search engines the content has permanently moved -->
    <link rel="canonical" href="https://ophel.app" />

    <!-- Suppress indexing of this redirect page to avoid duplicate content -->
    <meta name="robots" content="noindex, follow" />

    <title>Ophel Atlas Docs → ophel.app</title>

    <!-- Open Graph for link previews -->
    <meta property="og:url" content="https://ophel.app" />
    <meta property="og:title" content="Ophel Atlas Documentation" />
    <meta
      property="og:description"
      content="This documentation site has moved to ophel.app."
    />
  </head>
  <body>
    <p>
      The Ophel Atlas documentation has moved to
      <a href="https://ophel.app">ophel.app</a>.
    </p>
    <script>
      location.replace("https://ophel.app");
    </script>
  </body>
</html>
