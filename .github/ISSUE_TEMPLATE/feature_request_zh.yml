name: ✨ 功能需求
description: 提出新功能需求或改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您的建议！如果您觉得 Ophel 对您有帮助，请给项目点个 Star 🌟（Star 可以帮助项目被更多人看到）

        > [!NOTE]
        > - 本项目由个人维护，**功能请求不保证一定实现**。
        > - 功能优先级会根据项目整体情况综合评估。
        > - 提交前请确认您使用的是 Ophel **最新版本**，您需要的功能可能已在新版中实现。

  - type: checkboxes
    id: checklist
    attributes:
      label: 前置检查
      options:
        - label: 我已在 Issue 中搜索过类似需求，确认这不是一个重复提议
          required: true
        - label: 我已为项目点了 Star 🌟
          required: false
        - label: 我愿意为此提交 Pull Request 贡献代码
          required: false

  - type: dropdown
    id: installation_type
    attributes:
      label: 适用环境
      options:
        - 所有环境
        - 浏览器扩展
        - 油猴脚本
    validations:
      required: true

  - type: dropdown
    id: ai_platform
    attributes:
      label: 适用 AI 平台
      options:
        - 所有平台
        - Gemini (gemini.google.com)
        - Gemini Enterprise (business.gemini.google)
        - ChatGPT (chatgpt.com)
        - Claude (claude.ai)
        - Grok (grok.com)
        - AI Studio (aistudio.google.com)
        - DeepSeek (chat.deepseek.com)
        - 豆包 (www.doubao.com)
        - ima (ima.qq.com)
        - ChatGLM (chatglm.cn)
        - Kimi (www.kimi.com)
        - 通义千问 (www.qianwen.com)
        - Qwen Studio (chat.qwen.ai)
        - 元宝 (yuanbao.tencent.com)
        - Z.ai (chat.z.ai)
        - 其他
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 功能简述
      description: 一句话描述该功能
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题背景
      description: 您希望解决什么问题？
      placeholder: 我在使用...功能时，经常遇到...的问题
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 解决方案
      description: 应该如何工作？
      placeholder: 我希望能够...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否考虑过其他方案？
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: 其他信息
      description: 设计图、截图或其他细节
