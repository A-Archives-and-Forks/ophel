name: ✨ 功能需求 Feature Request
description: 提出新功能需求或改进建议 | Suggest a feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您的建议！如果您觉得 Ophel 对您有帮助，请给项目点个 Star 🌟（Star 可以帮助项目被更多人看到）
        Thanks for your suggestion! If Ophel helps you, please give it a Star 🌟（Star helps support the project）

        > [!NOTE]
        > - 本项目由个人维护，**功能请求不保证一定实现**。
        >   This project is personally maintained — feature requests are not guaranteed to be implemented.
        > - 功能优先级会根据项目整体情况综合评估。
        >   Feature priority is evaluated based on the overall project status.
        > - 提交前请确认您使用的是 Ophel **最新版本**，您需要的功能可能已在新版中实现。
        >   Please verify you are using the **latest version** of Ophel before submitting — the feature you need may already exist.

  - type: checkboxes
    id: checklist
    attributes:
      label: 前置检查 | Essential Checklist
      options:
        - label: 我已在 Issue 中搜索过类似需求，确认这不是一个重复提议 | I have searched for existing requests and confirmed this is not a duplicate
          required: true
        - label: 我已为项目点了 Star 🌟 | I have starred the project 🌟
          required: false
        - label: 我愿意为此提交 Pull Request 贡献代码 | I am willing to contribute a Pull Request for this
          required: false

  - type: dropdown
    id: installation_type
    attributes:
      label: 适用环境 | Target Environment
      options:
        - All Environments (所有环境)
        - Browser Extension (浏览器扩展)
        - Userscript (油猴脚本)
    validations:
      required: true

  - type: dropdown
    id: ai_platform
    attributes:
      label: 适用 AI 平台 | Target AI Platform
      options:
        - All Platforms (所有平台)
        - Gemini (gemini.google.com)
        - Gemini Enterprise (business.gemini.google)
        - ChatGPT (chatgpt.com)
        - Claude (claude.ai)
        - Grok (grok.com)
        - AI Studio (aistudio.google.com)
        - DeepSeek (chat.deepseek.com)
        - Doubao (www.doubao.com)
        - ima (ima.qq.com)
        - ChatGLM (chatglm.cn)
        - Kimi (www.kimi.com)
        - Qianwen (www.qianwen.com)
        - Qwen Studio (chat.qwen.ai)
        - Yuanbao (yuanbao.tencent.com)
        - Z.ai (chat.z.ai)
        - Other (其他)
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 功能简述 | Feature Summary
      description: 一句话描述该功能 | One sentence summary of the feature.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题背景 | Problem or Use Case
      description: 您希望解决什么问题？ | What problem are you trying to solve?
      placeholder: 我在使用...功能时，经常遇到...的问题 | When using [...], I find that...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 解决方案 | Proposed Solution
      description: 应该如何工作？ | How should it work?
      placeholder: 我希望能够... | I want to be able to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 | Alternatives Considered
      description: 是否考虑过其他方案？ | Any other ways you've considered?
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: 其他信息 | Additional Context
      description: 设计图、截图或其他细节 | Mockups, screenshots, or extra details.
